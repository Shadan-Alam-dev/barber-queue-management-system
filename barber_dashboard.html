<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barber Dashboard - Barber Queue</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { font-size: 16px; }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      padding: 1.25rem;
      font-family: 'Poppins', sans-serif;
      background: url('/barber-queue-management-system/background/barber_dash_bg.png') no-repeat center center fixed;
      background-size: cover;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-height: 100vh;
      color: #fff;
    }

    .home-btn-fixed-top {
        position: absolute;
        top: 1.25rem;
        left: 1.25rem;
        padding: 0.5rem 1rem;
        background-color: rgba(0, 121, 107, 0.7);
        color: white;
        border: none;
        border-radius: 0.375rem;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        z-index: 1000;
        font-size: 0.9rem;
        transition: 0.3s;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .home-btn-fixed-top:hover {
        background-color: #004d40;
        transform: translateY(-2px);
    }

    h2 {
      color: #f8f8ff;
      text-align: right;
      width: 100%;
      padding-right: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 2.2rem;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.6);
    }

    .queue-container {
      width: 100%;
      max-width: 37.5rem;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 1rem;
      box-shadow: 0 0.8rem 2.5rem rgba(0,0,0,0.4);
      padding: 1.5rem 2rem;
      margin-left: 2.5rem;
      margin-right: auto;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .person {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 0.5rem;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .person.serving {
        background-color: rgba(255, 235, 59, 0.1);
        border: 1px solid #ffeb3b;
        box-shadow: 0 0 10px rgba(255, 235, 59, 0.5);
    }

    .person span {
      font-weight: 500;
      font-size: 1.1rem;
      color: #e0dfff;
    }

    ..actions {
  display: flex;
  gap: 10px;
}

.actions button {
  padding: 6px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  color: white;
  font-weight: 500;
  font-size: 0.85rem;
  transition: all 0.25s ease;
  min-width: 65px;
}

/* START BUTTON */
.start-btn {
  background-color: #26c6da;
}

.start-btn:hover {
  background-color: #0097a7;
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.35);
}

.start-btn:disabled {
  background-color: #555;
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
  opacity: 0.6;
}

/* DONE BUTTON */
.done-btn {
  background-color: #388e3c;
}

.done-btn:hover {
  background-color: #2e7d32;
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.35);
}

.done-btn:disabled {
  background-color: #555;
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
  opacity: 0.6;
}
    .empty-queue-message {
        color: rgba(255, 255, 255, 0.6);
        font-style: italic;
        padding: 1rem;
        font-size: 1.1rem;
        text-align: center;
    }
  </style>
</head>
<body>

  <a href="index.html" class="home-btn-fixed-top">🏠 Home</a>

  <h2>Barber Queue Dashboard</h2>

  <div class="queue-container" id="queueList">
    <div class="empty-queue-message" id="emptyQueueMessage">
        The queue is currently empty.
    </div>
  </div>

  <script>
    let mockQueue = ["Shadan", "Anku", "Shivam", "Gautam C", "Aakarsh", "Pranav"];
let currentlyServingIndex = null;

function renderQueue() {
  const queueList = document.getElementById("queueList");
  queueList.innerHTML = "";

  if (mockQueue.length === 0) {
    const emptyMessageDiv = document.createElement("div");
    emptyMessageDiv.classList.add("empty-queue-message");
    emptyMessageDiv.textContent = "The queue is currently empty.";
    queueList.appendChild(emptyMessageDiv);
    return;
  }

  mockQueue.forEach((name, index) => {
    const personDiv = document.createElement("div");
    personDiv.classList.add("person");

    if (index === currentlyServingIndex) {
      personDiv.classList.add("serving");
    }

    const nameSpan = document.createElement("span");
    nameSpan.textContent = `${index + 1}. ${name}`;

    const actionsDiv = document.createElement("div");
    actionsDiv.className = "actions";

    const startBtn = document.createElement("button");
    startBtn.textContent = "Start";
    startBtn.className = "start-btn";

    const doneBtn = document.createElement("button");
    doneBtn.textContent = "Done";
    doneBtn.className = "done-btn";

    // LOGIC 🔥
    startBtn.disabled = (currentlyServingIndex !== null || index !== 0);
    doneBtn.disabled = (index !== currentlyServingIndex);

    startBtn.onclick = () => handleStart(index);
    doneBtn.onclick = () => handleDone(index);

    actionsDiv.appendChild(startBtn);
    actionsDiv.appendChild(doneBtn);

    personDiv.appendChild(nameSpan);
    personDiv.appendChild(actionsDiv);
    queueList.appendChild(personDiv);
  });
}

function handleStart(index) {
  if (currentlyServingIndex !== null) return;
  if (index !== 0) return;

  currentlyServingIndex = index;
  renderQueue();
}

function handleDone(index) {
  if (index !== currentlyServingIndex) return;

  mockQueue.splice(index, 1);
  currentlyServingIndex = null;
  renderQueue();
}

renderQueue();
  </script>

</body>
</html>
